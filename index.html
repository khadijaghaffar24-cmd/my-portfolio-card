<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khadija | Profile Card</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .bio {
            color: #d0d0d0;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-github {
            background: #333;
            color: white;
            box-shadow: 0 5px 15px rgba(51, 51, 51, 0.3);
        }

        .btn-github:hover {
            background: #000;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .btn-linkedin {
            background: #0A66C2;
            color: white;
            box-shadow: 0 5px 15px rgba(10, 102, 194, 0.3);
        }

        .btn-linkedin:hover {
            background: #004182;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(10, 102, 194, 0.4);
        }

        .btn-x {
            background: #000;
            color: white;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.35);
        }

        .btn-x:hover {
            background: #1a1a1a;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.45);
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 26px;
            }
            .btn {
                padding: 10px 25px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">
            <img src="./profile.jpeg" alt="Khadija profile photo">
        </div>
        <h1>Khadija Ghaffar</h1>
        <p class="bio">
            Web Developer in training. Exploring AI &amp; design.
        </p>
        <div class="buttons">
            <a href="https://github.com/khadijaghaffar24-cmd" target="_blank" class="btn btn-github">🐙 GitHub</a>
            <a href="https://www.linkedin.com/in/khadija-ghaffar-8587a9392/" target="_blank" rel="noopener noreferrer" class="btn btn-linkedin">💼 LinkedIn</a>
            <a href="https://x.com/d_Deejacherie" target="_blank" rel="noopener noreferrer" class="btn btn-x">𝕏 Twitter</a>
        </div>
    </div>
</body>
</html>
